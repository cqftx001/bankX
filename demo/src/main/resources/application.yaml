spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: demo

  datasource:
    url: jdbc:postgresql://localhost:5432/bankx
    username: ${PGDB_USERNAME}
    password: ${PGDB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: kcsmtp0@gmail.com
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enables: true
            required: true

bankx:
  framework:
    swagger:
        swagger-path: com.bankx.controller
        title: BankX
        description: BankX API Documentation
        contact-name: KC
        contact-url: https://github.com/cqftx001
        contact-email: qifanc666@gmail.com
    oss:
      endpoint: ${OSS_ENDPOINT}
      accessKeyId: ${OSS_ACCESS_KEY_ID}
      accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
      bucketName: ${OSS_BUCKET_NAME}
    logging:
      level:
        com.bankx: debug
        org.springframework.security: info
jwt:
     base64-encoded-secret-key: ${ENCODED_SECRET_KEY}
     ttl: 3600000
